services:
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-nifty_trader}
      POSTGRES_USER: ${DB_USER:-trader}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-trader} -d ${DB_NAME:-nifty_trader}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${BACKEND_IMAGE:?Set BACKEND_IMAGE}
    restart: unless-stopped
    environment:
      DATA_DIR: /app/data
      APP_ENV: production
      APP_DEBUG: "false"
      APP_HOST: "0.0.0.0"
      APP_PORT: "8000"
      APP_LOG_LEVEL: "INFO"
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY}
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-nifty_trader}
      DB_USER: ${DB_USER:-trader}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      TELEGRAM_STATUS_INTERVAL_MINUTES: ${TELEGRAM_STATUS_INTERVAL_MINUTES:-30}
      USD_INR_REFERENCE_RATE: ${USD_INR_REFERENCE_RATE:-83.0}
      TRADING_MODE: ${TRADING_MODE:-paper}
      RISK_CIRCUIT_BREAKER_ENABLED: ${RISK_CIRCUIT_BREAKER_ENABLED:-false}
      AGENT_AUTO_START: "true"
      AGENT_SCAN_INTERVAL: ${AGENT_SCAN_INTERVAL:-30}
      AGENT_DEFAULT_TIMEFRAME: ${AGENT_DEFAULT_TIMEFRAME:-5}
      AGENT_EXECUTION_TIMEFRAMES: ${AGENT_EXECUTION_TIMEFRAMES:-3,5,15}
      AGENT_REFERENCE_TIMEFRAMES: ${AGENT_REFERENCE_TIMEFRAMES:-60,D}
      AGENT_TRADE_NSE_WHEN_OPEN: ${AGENT_TRADE_NSE_WHEN_OPEN:-true}
      AGENT_TRADE_US_WHEN_OPEN: ${AGENT_TRADE_US_WHEN_OPEN:-true}
      AGENT_TRADE_US_OPTIONS: ${AGENT_TRADE_US_OPTIONS:-true}
      AGENT_TRADE_CRYPTO_24X7: ${AGENT_TRADE_CRYPTO_24X7:-true}
      AGENT_LIBERAL_BOOTSTRAP_ENABLED: ${AGENT_LIBERAL_BOOTSTRAP_ENABLED:-true}
      AGENT_BOOTSTRAP_CYCLES: ${AGENT_BOOTSTRAP_CYCLES:-600}
      AGENT_BOOTSTRAP_SIZE_MULTIPLIER: ${AGENT_BOOTSTRAP_SIZE_MULTIPLIER:-2.0}
      AGENT_BOOTSTRAP_MAX_CONCENTRATION_PCT: ${AGENT_BOOTSTRAP_MAX_CONCENTRATION_PCT:-100.0}
      AGENT_BOOTSTRAP_MAX_OPEN_POSITIONS: ${AGENT_BOOTSTRAP_MAX_OPEN_POSITIONS:-20}
      AGENT_BOOTSTRAP_RISK_PER_TRADE_PCT: ${AGENT_BOOTSTRAP_RISK_PER_TRADE_PCT:-2.0}
      AGENT_INDIA_CAPITAL: ${AGENT_INDIA_CAPITAL:-250000}
      AGENT_US_CAPITAL: ${AGENT_US_CAPITAL:-250000}
      AGENT_CRYPTO_CAPITAL: ${AGENT_CRYPTO_CAPITAL:-250000}
      AGENT_INDIA_MAX_INSTRUMENT_PCT: ${AGENT_INDIA_MAX_INSTRUMENT_PCT:-25}
      AGENT_US_MAX_INSTRUMENT_PCT: ${AGENT_US_MAX_INSTRUMENT_PCT:-20}
      AGENT_CRYPTO_MAX_INSTRUMENT_PCT: ${AGENT_CRYPTO_MAX_INSTRUMENT_PCT:-20}
      AGENT_REINFORCEMENT_ENABLED: ${AGENT_REINFORCEMENT_ENABLED:-true}
      AGENT_REINFORCEMENT_ALPHA: ${AGENT_REINFORCEMENT_ALPHA:-0.2}
      AGENT_REINFORCEMENT_SIZE_BOOST_PCT: ${AGENT_REINFORCEMENT_SIZE_BOOST_PCT:-60.0}
      AGENT_STRATEGY_CAPITAL_BUCKET_ENABLED: ${AGENT_STRATEGY_CAPITAL_BUCKET_ENABLED:-false}
      AGENT_STRATEGY_MAX_CONCURRENT_POSITIONS: ${AGENT_STRATEGY_MAX_CONCURRENT_POSITIONS:-4}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      ALPHAVANTAGE_API_KEY: ${ALPHAVANTAGE_API_KEY:-}
      FYERS_APP_ID: ${FYERS_APP_ID:-}
      FYERS_SECRET_KEY: ${FYERS_SECRET_KEY:-}
      FYERS_REDIRECT_URI: ${FYERS_REDIRECT_URI:-https://trade.fyers.in/api-login/redirect-uri/index.html}
      FYERS_REDIRECT_FRONTEND_URL: ${FYERS_REDIRECT_FRONTEND_URL:-http://${PUBLIC_HOST}/settings}
    volumes:
      - ./backend_data:/app/data
    ports:
      - "${BACKEND_PUBLIC_PORT:-8000}:8000"
    expose:
      - "8000"
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    image: ${FRONTEND_IMAGE:?Set FRONTEND_IMAGE}
    restart: unless-stopped
    environment:
      API_HOST: backend
      NEXT_PUBLIC_API_URL: /api/v1
      PUBLIC_WS_URL: ${PUBLIC_WS_URL:-ws://${PUBLIC_HOST}:${BACKEND_PUBLIC_PORT:-8000}/api/v1}
      NEXT_PUBLIC_APP_NAME_BASE: ${NEXT_PUBLIC_APP_NAME_BASE:-AI TRADER}
      NEXT_PUBLIC_APP_INSTANCE_LABEL: ${NEXT_PUBLIC_APP_INSTANCE_LABEL:-AWS}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1))"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  timescaledb_data:
    driver: local
  redis_data:
    driver: local
