# Docker Compose configuration for NiftyTraderGravity
# No version field needed for Docker Compose v2+

services:
  # ---------------------------------------------------------------------------
  # TimescaleDB (PostgreSQL with time-series extensions)
  # ---------------------------------------------------------------------------
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: NiftyTraderGravity-timescaledb
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-nifty_trader}
      POSTGRES_USER: ${DB_USER:-trader}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./docker/init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-trader} -d ${DB_NAME:-nifty_trader}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nifty-gravity-network

  # ---------------------------------------------------------------------------
  # Redis (cache + message broker for Celery)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: NiftyTraderGravity-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nifty-gravity-network

  # ---------------------------------------------------------------------------
  # Backend API (FastAPI + Uvicorn)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: NiftyTraderGravity-backend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      # Database — point to the timescaledb service
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-nifty_trader}
      DB_USER: ${DB_USER:-trader}
      DB_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
      # Redis — point to the redis service
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: ""
      # App
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_HOST: "0.0.0.0"
      APP_PORT: 8000
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
      SECRET_KEY: ${SECRET_KEY:-docker_dev_secret_key}
      # Trading
      TRADING_MODE: ${TRADING_MODE:-paper}
      AGENT_AUTO_START: ${AGENT_AUTO_START:-true}
      MAX_DAILY_LOSS_PCT: ${MAX_DAILY_LOSS_PCT:-2.0}
      MAX_POSITION_SIZE_PCT: ${MAX_POSITION_SIZE_PCT:-25.0}
      MAX_CONCENTRATION_PCT: ${MAX_CONCENTRATION_PCT:-30.0}
      MAX_OPEN_POSITIONS: ${MAX_OPEN_POSITIONS:-6}
      MAX_TRADE_RISK_PCT: ${MAX_TRADE_RISK_PCT:-0.5}
      AGENT_DEFAULT_TIMEFRAME: ${AGENT_DEFAULT_TIMEFRAME:-5}
      AGENT_EXECUTION_TIMEFRAMES: ${AGENT_EXECUTION_TIMEFRAMES:-3,5,15}
      AGENT_REFERENCE_TIMEFRAMES: ${AGENT_REFERENCE_TIMEFRAMES:-60,D}
      AGENT_LIBERAL_BOOTSTRAP_ENABLED: ${AGENT_LIBERAL_BOOTSTRAP_ENABLED:-true}
      AGENT_BOOTSTRAP_CYCLES: ${AGENT_BOOTSTRAP_CYCLES:-300}
      AGENT_BOOTSTRAP_SIZE_MULTIPLIER: ${AGENT_BOOTSTRAP_SIZE_MULTIPLIER:-2.0}
      AGENT_BOOTSTRAP_MAX_CONCENTRATION_PCT: ${AGENT_BOOTSTRAP_MAX_CONCENTRATION_PCT:-100.0}
      AGENT_BOOTSTRAP_MAX_OPEN_POSITIONS: ${AGENT_BOOTSTRAP_MAX_OPEN_POSITIONS:-20}
      AGENT_BOOTSTRAP_RISK_PER_TRADE_PCT: ${AGENT_BOOTSTRAP_RISK_PER_TRADE_PCT:-2.0}
      AGENT_OPTION_TIME_EXIT_MINUTES: ${AGENT_OPTION_TIME_EXIT_MINUTES:-30}
      AGENT_OPTION_DEFAULT_STOP_LOSS_PCT: ${AGENT_OPTION_DEFAULT_STOP_LOSS_PCT:-10.0}
      AGENT_OPTION_DEFAULT_TARGET_PCT: ${AGENT_OPTION_DEFAULT_TARGET_PCT:-18.0}
      AGENT_REINFORCEMENT_ENABLED: ${AGENT_REINFORCEMENT_ENABLED:-true}
      AGENT_REINFORCEMENT_ALPHA: ${AGENT_REINFORCEMENT_ALPHA:-0.2}
      AGENT_REINFORCEMENT_SIZE_BOOST_PCT: ${AGENT_REINFORCEMENT_SIZE_BOOST_PCT:-60.0}
      AGENT_US_SYMBOLS: ${AGENT_US_SYMBOLS:-US:SPY,US:QQQ,US:DIA,US:IWM,US:AAPL,US:MSFT,US:GOOGL,US:AMZN,US:META,US:NVDA,US:TSLA,US:AMD,US:CRM,US:ORCL,US:NFLX,US:JPM,US:GS,US:BAC,US:WFC,US:MS,US:V,US:MA,US:AXP,US:BLK,US:SCHW,US:UNH,US:JNJ,US:PFE,US:ABBV,US:MRK,US:LLY,US:TMO,US:XOM,US:CVX,US:COP,US:SLB,US:CAT,US:GE,US:HON,US:UPS,US:BA,US:LMT,US:RTX,US:PG,US:KO,US:PEP,US:NKE,US:MCD,US:WMT,US:COST,US:DIS}
      AGENT_CRYPTO_SYMBOLS: ${AGENT_CRYPTO_SYMBOLS:-CRYPTO:BTCUSDT,CRYPTO:ETHUSDT,CRYPTO:BNBUSDT,CRYPTO:SOLUSDT,CRYPTO:XRPUSDT,CRYPTO:ADAUSDT,CRYPTO:DOGEUSDT,CRYPTO:AVAXUSDT,CRYPTO:DOTUSDT,CRYPTO:LINKUSDT}
      AGENT_TRADE_NSE_WHEN_OPEN: ${AGENT_TRADE_NSE_WHEN_OPEN:-true}
      AGENT_TRADE_US_WHEN_OPEN: ${AGENT_TRADE_US_WHEN_OPEN:-true}
      AGENT_TRADE_US_OPTIONS: ${AGENT_TRADE_US_OPTIONS:-true}
      AGENT_TRADE_CRYPTO_24X7: ${AGENT_TRADE_CRYPTO_24X7:-true}
      TELEGRAM_STATUS_INTERVAL_MINUTES: ${TELEGRAM_STATUS_INTERVAL_MINUTES:-30}
      USD_INR_REFERENCE_RATE: ${USD_INR_REFERENCE_RATE:-83.0}
      DATA_DIR: /app/data
      # Note: Fyers credentials and tokens are persisted in the ./data directory.
    volumes:
      - ./data:/app/data
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/system"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - nifty-gravity-network

  # ---------------------------------------------------------------------------
  # Frontend (Next.js Dashboard)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_HOST: backend
        NEXT_PUBLIC_API_URL: /api/v1
        NEXT_PUBLIC_WS_URL: ""
        NEXT_PUBLIC_APP_NAME_BASE: ${NEXT_PUBLIC_APP_NAME_BASE:-NiftyTraderGravity}
        NEXT_PUBLIC_APP_INSTANCE_LABEL: ${NEXT_PUBLIC_APP_INSTANCE_LABEL:-LOCAL}
    container_name: NiftyTraderGravity-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      # Tell Next.js rewrites to proxy to the backend container (internal Docker network)
      API_HOST: backend
      # Use same-origin proxy to avoid browser CORS/mixed-content issues.
      NEXT_PUBLIC_API_URL: /api/v1
      NEXT_PUBLIC_APP_NAME_BASE: ${NEXT_PUBLIC_APP_NAME_BASE:-NiftyTraderGravity}
      NEXT_PUBLIC_APP_INSTANCE_LABEL: ${NEXT_PUBLIC_APP_INSTANCE_LABEL:-LOCAL}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 10s
      start_period: 20s
      retries: 3
    networks:
      - nifty-gravity-network

volumes:
  timescaledb_data:
    driver: local
  redis_data:
    driver: local

networks:
  nifty-gravity-network:
    driver: bridge
