version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # TimescaleDB (PostgreSQL with time-series extensions)
  # ---------------------------------------------------------------------------
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: nifty-timescaledb
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-nifty_trader}
      POSTGRES_USER: ${DB_USER:-trader}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-trader} -d ${DB_NAME:-nifty_trader}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nifty-network

  # ---------------------------------------------------------------------------
  # Redis (cache + message broker for Celery)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: nifty-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nifty-network

  # ---------------------------------------------------------------------------
  # Backend API (FastAPI + Uvicorn)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: nifty-backend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      # Database — point to the timescaledb service
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-nifty_trader}
      DB_USER: ${DB_USER:-trader}
      DB_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
      # Redis — point to the redis service
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: ""
      # App
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_HOST: "0.0.0.0"
      APP_PORT: 8000
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
      SECRET_KEY: ${SECRET_KEY:-docker_dev_secret_key}
      # Trading
      TRADING_MODE: ${TRADING_MODE:-paper}
      MAX_DAILY_LOSS_PCT: ${MAX_DAILY_LOSS_PCT:-2.0}
      MAX_POSITION_SIZE_PCT: ${MAX_POSITION_SIZE_PCT:-25.0}
      MAX_OPEN_POSITIONS: ${MAX_OPEN_POSITIONS:-3}
      # NOTE: FYERS_APP_ID / FYERS_SECRET_KEY are intentionally NOT set here.
      # Injecting them as empty OS env vars would permanently override the
      # /app/data/.env file written by the Settings page (OS vars beat file vars
      # in pydantic-settings).  Credentials are entered via the UI and stored
      # in the persistent volume at /app/data/.env.
      FYERS_REDIRECT_URI: ${FYERS_REDIRECT_URI:-https://trade.fyers.in/api-login/redirect-uri/index.html}
      # Telegram (leave empty to disable)
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      # AI Agent
      AGENT_AUTO_START: ${AGENT_AUTO_START:-false}
      AGENT_SCAN_INTERVAL: ${AGENT_SCAN_INTERVAL:-30}
      AGENT_DEFAULT_TIMEFRAME: ${AGENT_DEFAULT_TIMEFRAME:-5}
      AGENT_EXECUTION_TIMEFRAMES: ${AGENT_EXECUTION_TIMEFRAMES:-3,5,15}
      AGENT_REFERENCE_TIMEFRAMES: ${AGENT_REFERENCE_TIMEFRAMES:-60,D}
      AGENT_DEFAULT_SYMBOLS: ${AGENT_DEFAULT_SYMBOLS:-NSE:NIFTY50-INDEX,NSE:NIFTYBANK-INDEX,NSE:FINNIFTY-INDEX,NSE:NIFTYMIDCAP50-INDEX,BSE:SENSEX-INDEX}
      # Persistent data directory — credentials + token file survive container restarts
      DATA_DIR: /app/data
    volumes:
      - nifty_data:/app/data   # .env (Fyers credentials) + .fyers_token.json persist here
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - nifty-network

  # ---------------------------------------------------------------------------
  # Frontend (Next.js Dashboard)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_NAME_BASE: ${NEXT_PUBLIC_APP_NAME_BASE:-AI TRADER}
        NEXT_PUBLIC_APP_INSTANCE_LABEL: ${NEXT_PUBLIC_APP_INSTANCE_LABEL:-LOCAL}
    container_name: nifty-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      # Tell Next.js rewrites to proxy to the backend container (internal Docker network)
      API_HOST: backend
      # Public URLs for browser-side WebSocket connections (uses host port)
      NEXT_PUBLIC_API_URL: http://localhost:${APP_PORT:-8080}/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:${APP_PORT:-8080}/api/v1
      NEXT_PUBLIC_APP_NAME_BASE: ${NEXT_PUBLIC_APP_NAME_BASE:-AI TRADER}
      NEXT_PUBLIC_APP_INSTANCE_LABEL: ${NEXT_PUBLIC_APP_INSTANCE_LABEL:-LOCAL}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 10s
      start_period: 20s
      retries: 3
    networks:
      - nifty-network

volumes:
  timescaledb_data:
    driver: local
  redis_data:
    driver: local
  nifty_data:
    driver: local   # persists Fyers credentials (.env) and token (.fyers_token.json)

networks:
  nifty-network:
    driver: bridge
